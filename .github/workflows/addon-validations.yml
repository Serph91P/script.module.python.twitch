name: Add-on Validations

on:
  push:
    branches: [main, develop]

  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  source-tests:
    name: Source tests
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Checkout Add-on
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Parser contract tests
        run: python -m unittest discover -s tests -v

  package:
    needs: source-tests
    permissions:
      contents: read
      id-token: write
    uses: Serph91P/repository.serph91p/.github/workflows/reusable-addon-package.yml@7adff881ab5d0a7fc63f7474a78b2688e2e6eee4
    with:
      addon_id: script.module.python.twitch
      runtime_entries_json: '["addon.xml","changelog.txt","resources/"]'
